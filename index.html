<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picotiny Music</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="cockpit-wrapper">
        <img src="images/Space_Cowboy_Cockpit.jpg" alt="Cockpit" class="cockpit-image">
    
        <button id="radio-toggle" title="Переключить Режим"></button>
        <div id="deck-display">HI-FI</div>
    </div>

    <div class="player-container">
        <div class="cover-wrapper">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500&q=80" id="cover" alt="Cover">
        </div>

        <div class="track-info">
            <h2 class="track-title" id="title">Cyberpunk Drive</h2>
            <p class="track-artist" id="artist">Picotiny Artist</p>
        </div>

        <div class="progress-area">
            <div class="progress-bar-container" id="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>
            <div class="time-info">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn-nav" id="prev">|&lt;</button>
            <button class="btn-play" id="play">▶</button>
            <button class="btn-nav" id="next">&gt;|</button>
        </div>
    </div>

    <div class="music-visualizer-glow"></div>

    <footer class="site-footer">
        <div class="footer-copyright">
            © 2026 Picotiny Music. Все права защищены.
        </div>
        <div class="footer-links">
            <a href="https://t.me/arachnanotes" target="_blank" rel="noopener noreferrer" class="footer-link">Telegram</a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
